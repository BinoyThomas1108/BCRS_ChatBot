<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCRS Assistant</title>
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <div id="chat-container">
      <div id="chat-header">
        <img src="BCRS Logo.png" id="logo">
        <span id="title">BCRS Assistant</span>
      </div>
    <div id="chat-box"></div>
    <div id="input-area">
      <input type="text" id="input" placeholder="Ask away">
      <button id="send">Send</button>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
